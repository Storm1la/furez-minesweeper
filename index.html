<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FureZ Minesweeper</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Главное меню -->
    <div id="main-menu" class="screen active">
        <div class="container">
            <div class="header">
                <h1 class="title">FureZ Minesweeper</h1>
                <p class="subtitle">Классический сапёр</p>
            </div>
            <div class="menu">
                <button class="menu-btn solo" id="btn-solo">Одиночная</button>
                <button class="menu-btn coop" id="btn-coop">КООП</button>
                <button class="menu-btn duel" id="btn-duel">Дуэли</button>
            </div>
        </div>
    </div>

    <!-- Экран настроек одиночной игры -->
    <div id="solo-setup" class="screen">
        <div class="container">
            <h2 class="screen-title">Новая игра</h2>
            
            <div class="settings">
                <div class="setting-group">
                    <label>Размер поля</label>
                    <select id="board-size">
                        <option value="9,9,10">9 × 9 (Новичок, 10 мин)</option>
                        <option value="16,16,40">16 × 16 (Средний, 40 мин)</option>
                        <option value="16,30,99">16 × 30 (Эксперт, 99 мин)</option>
                        <option value="custom">Свой размер</option>
                    </select>
                </div>

                <div id="custom-settings" class="custom-settings hidden">
                    <div class="setting-group">
                        <label>Строки</label>
                        <input type="number" id="custom-rows" value="10" min="5" max="20">
                    </div>
                    <div class="setting-group">
                        <label>Столбцы</label>
                        <input type="number" id="custom-cols" value="10" min="5" max="30">
                    </div>
                    <div class="setting-group">
                        <label>Количество мин</label>
                        <input type="number" id="custom-mines" value="15" min="1">
                    </div>
                </div>
            </div>

            <button class="start-btn" id="btn-start-game">Начать игру</button>
            <button class="back-btn" id="btn-back-to-menu">← Назад в меню</button>
        </div>
    </div>

    <!-- Сама игра -->
    <div id="game-screen" class="screen">
        <div class="game-header">
            <div class="info">
                <span id="mines-left">000</span>
            </div>
            <div class="info">
                <span id="timer">000</span>
            </div>
        </div>

        <div id="board" class="board"></div>

        <div class="game-controls">
            <button class="control-btn" id="btn-new-game">Новая игра</button>
            <button class="control-btn" id="btn-menu">В меню</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
