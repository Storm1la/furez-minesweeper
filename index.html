<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FureZ Minesweeper</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Главное меню -->
    <div id="main-menu" class="screen active">
        <div class="container">
            <div class="header">
                <h1 class="title">FureZ Minesweeper</h1>
                <p class="subtitle">Классический сапер в Telegram</p>
            </div>

            <div class="menu">
                <button class="menu-btn solo" id="btn-solo">Одиночная</button>
                <button class="menu-btn coop" id="btn-coop">КООП</button>
                <button class="menu-btn duel" id="btn-duel">Дуэли</button>
            </div>

            <div class="footer">
                <p class="version">v0.4 • Сделано с ❤️ by FureZ</p>
            </div>
        </div>
    </div>

    <!-- Экран настроек -->
    <div id="solo-settings" class="screen">
        <div class="container">
            <div class="header settings-header">
                <button id="back-to-menu" class="back-btn">🏠</button>
                <h1 class="title">Одиночная игра</h1>
            </div>

            <div class="settings-form">
                <div class="setting-group">
                    <label>Размер поля</label>
                    <div class="preset-buttons">
                        <button class="preset-btn active" data-width="9" data-height="9">9×9<br><small>Лёгкий</small></button>
                        <button class="preset-btn" data-width="16" data-height="16">16×16<br><small>Средний</small></button>
                        <button class="preset-btn" data-width="16" data-height="30">16×30<br><small>Эксперт</small></button>
                        <button class="preset-btn custom" id="custom-size">Свой размер</button>
                    </div>
                </div>

                <div id="custom-fields" class="custom-fields hidden">
                    <div class="input-row">
                        <div>
                            <label>Ширина</label>
                            <input type="number" id="custom-width" value="10" min="5" max="30">
                        </div>
                        <div>
                            <label>Высота</label>
                            <input type="number" id="custom-height" value="10" min="5" max="30">
                        </div>
                    </div>
                </div>

                <div class="setting-group">
                    <label for="mines">Количество мин</label>
                    <input type="number" id="mines" value="10" min="1" class="mines-input">
                    <small id="mines-info" class="info-text">Рекомендуется: 10 для 9×9</small>
                </div>
            </div>

            <button id="start-game" class="start-btn">Начать игру</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
